<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Student Marks Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><style>
body { font-family: 'Inter', sans-serif; } ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: #111827; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; } .apexcharts-tooltip { background: #1f2937 !important; border: 1px solid #374151 !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important; } .apexcharts-tooltip-title { background: #374151 !important; border-bottom: 1px solid #4b5563 !important; color: #ffffff !important; } .apexcharts-legend-text { color: #9ca3af !important; } .apexcharts-xaxis-label, .apexcharts-yaxis-label { fill: #9ca3af !important; } .apexcharts-gridline { stroke: #374151 !important; }
</style>
</head><body class="bg-gray-900 text-white font-sans"><div class="container mx-auto p-6"><header class="mb-8 text-center"><h1 class="text-4xl font-bold text-blue-400 tracking-tight">Student Analytics Dashboard</h1><p class="text-gray-400 mt-2">Comprehensive academic performance insights</p></header><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8"><div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700"><h2 class="text-lg font-semibold mb-4 text-blue-300">Overall Average Score</h2><div id="overallChart" class="w-full h-64"></div></div><div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700"><h2 class="text-lg font-semibold mb-4 text-blue-300">Subject Distribution</h2><div id="subjectChart" class="w-full h-64"></div></div><div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700"><h2 class="text-lg font-semibold mb-4 text-blue-300">Subject Performance Trends</h2><div id="trendChart" class="w-full h-64"></div></div></div><div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700"><h2 class="text-xl font-semibold mb-6 text-blue-300">Student Academic Record</h2><div class="overflow-x-auto"><table class="min-w-full divide-y divide-gray-700"><thead class="bg-gray-900/50"><tr><th scope="col" class="px-6 py-4 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Student Name</th><th scope="col" class="px-6 py-4 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Maths</th><th scope="col" class="px-6 py-4 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Science</th><th scope="col" class="px-6 py-4 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">History</th><th scope="col" class="px-6 py-4 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">English</th><th scope="col" class="px-6 py-4 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Status</th></tr></thead><tbody id="studentTableBody" class="divide-y divide-gray-700"></tbody></table></div></div></div><script src="https://cdn.jsdelivr.net/npm/apexcharts"></script><script>
document.addEventListener('DOMContentLoaded', function() { const SUBJECTS = ['Maths', 'Science', 'History', 'English']; const COLORS = ['#f87171', '#34d399', '#fbbf24', '#60a5fa']; function generateData(count) { return Array.from({ length: count }, (_, i) => { const s = { name: `Student ${i + 1}` }; let total = 0; SUBJECTS.forEach(sub => { const val = Math.floor(Math.random() * (99 - 60 + 1)) + 60; s[sub.toLowerCase()] = val; total += val; }); s.average = (total / SUBJECTS.length).toFixed(1); return s; }); } const students = generateData(8); const tableBody = document.getElementById('studentTableBody'); tableBody.innerHTML = students.map(s => `<tr class="hover:bg-gray-700/30 transition-colors"><td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-white">${s.name}</td><td class="px-6 py-4 text-sm text-gray-300">${s.maths}</td><td class="px-6 py-4 text-sm text-gray-300">${s.science}</td><td class="px-6 py-4 text-sm text-gray-300">${s.history}</td><td class="px-6 py-4 text-sm text-gray-300">${s.english}</td><td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded bg-green-900/40 text-green-400">${s.average}%</span></td></tr>`).join(''); const names = students.map(s => s.name); new ApexCharts(document.querySelector("#overallChart"), { chart: { type: 'bar', height: 250, toolbar: { show: false } }, series: [{ name: 'Average', data: students.map(s => parseFloat(s.average)) }], colors: ['#3b82f6'], plotOptions: { bar: { borderRadius: 4, columnWidth: '45%' } }, xaxis: { categories: names, labels: { show: false } }, grid: { borderColor: '#374151' }, tooltip: { theme: 'dark' } }).render(); const averages = SUBJECTS.map(sub => (students.reduce((a, b) => a + b[sub.toLowerCase()], 0) / students.length).toFixed(1)); new ApexCharts(document.querySelector("#subjectChart"), { chart: { type: 'donut', height: 250 }, series: averages.map(Number), labels: SUBJECTS, colors: COLORS, legend: { position: 'bottom' }, dataLabels: { enabled: false }, tooltip: { theme: 'dark' } }).render(); new ApexCharts(document.querySelector("#trendChart"), { chart: { type: 'line', height: 250, toolbar: { show: false } }, series: SUBJECTS.map((sub, i) => ({ name: sub, data: students.map(s => s[sub.toLowerCase()]) })), colors: COLORS, stroke: { curve: 'smooth', width: 3 }, xaxis: { categories: names, labels: { show: false } }, grid: { borderColor: '#374151' }, tooltip: { theme: 'dark' } }).render(); });
</script>
</body></html>
