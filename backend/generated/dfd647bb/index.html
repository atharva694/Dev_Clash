<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
<style>
body.dark {
    background-color: #1f2937;
    color: #ffffff;
}

body.light {
    background-color: #f3f4f6;
    color: #111827;
}

body.light h1 {
    color: #6366f1;
}

body.light #session-info {
    color: #4b5563;
}

body.light #timer-display {
    color: #93c5fd;
}

/* Dark theme specific overrides */
body.dark #theme-toggle {
    background-color: #374151;
    border-color: #4b5563;
}

body.dark #theme-toggle:hover {
    background-color: #4b5563;
}

/* Base styles for elements that might be overridden by theme */
#session-info {
    color: #9ca3af;
}

#timer-display {
    color: #a5b4fc;
}

#theme-toggle {
    background-color: #374151;
    border-color: #4b5563;
}

#theme-toggle:hover {
    background-color: #4b5563;
}

button:hover {
    filter: brightness(1.1);
}

/* Input field styles for better integration */
input[type="number"] {
    border: 1px solid #4b5563;
    background-color: #374151;
    color: #ffffff;
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    text-align: center;
}

body.light input[type="number"] {
    border-color: #9ca3af;
    background-color: #e5e7eb;
    color: #111827;
}

/* Add styles for the background color changes */
.bg-purple-700 {
    background-color: #7c3aed;
}
.bg-blue-700 {
    background-color: #2563eb;
}
.bg-green-700 {
    background-color: #10b981;
}

</style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center p-4 dark">
    <div class="text-center space-y-6">
        <h1 class="text-5xl font-bold text-indigo-400">Pomodoro Timer</h1>
        <div class="flex justify-center space-x-4 mb-8">
            <button id="theme-toggle" class="px-4 py-2 rounded-lg border border-gray-600 hover:bg-gray-700 transition duration-300">Switch to Light Theme</button>
        </div>
        <div id="timer-display" class="text-8xl font-extrabold text-indigo-300 mb-4">25:00</div>
        <div id="session-info" class="text-xl text-gray-300 mb-8">Work Session 1</div>
        <div class="flex justify-center space-x-4">
            <button id="start-btn" class="px-8 py-3 rounded-lg bg-green-600 hover:bg-green-700 text-white font-bold transition duration-300">Start</button>
            <button id="pause-btn" class="px-8 py-3 rounded-lg bg-yellow-600 hover:bg-yellow-700 text-white font-bold transition duration-300 hidden">Pause</button>
            <button id="reset-btn" class="px-8 py-3 rounded-lg bg-red-600 hover:bg-red-700 text-white font-bold transition duration-300">Reset</button>
        </div>
        <div class="mt-12 text-sm text-gray-400">
            <p>Work: <input type="number" id="work-duration" value="25" min="1" max="45" class="w-16 text-center bg-gray-700 rounded px-1"> min | Short Break: <input type="number" id="short-break-duration" value="5" min="1" class="w-16 text-center bg-gray-700 rounded px-1"> min | Long Break: <input type="number" id="long-break-duration" value="10" min="1" class="w-16 text-center bg-gray-700 rounded px-1"> min | Long Break every <input type="number" id="long-break-interval" value="4" min="1" class="w-16 text-center bg-gray-700 rounded px-1"> sessions</p>
        </div>
    </div>

    <audio id="timer-end-sound">
        <source src="https://www.soundjay.com/buttons/images/sound-3.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
<script>
const timerDisplay = document.getElementById('timer-display');
const sessionInfo = document.getElementById('session-info');
const startBtn = document.getElementById('start-btn');
const pauseBtn = document.getElementById('pause-btn');
const resetBtn = document.getElementById('reset-btn');
const timerEndSound = document.getElementById('timer-end-sound');
const themeToggle = document.getElementById('theme-toggle');
const body = document.body;

const workDurationInput = document.getElementById('work-duration');
const shortBreakDurationInput = document.getElementById('short-break-duration');
const longBreakDurationInput = document.getElementById('long-break-duration');
const longBreakIntervalInput = document.getElementById('long-break-interval');

let timer;
let timeLeft;
let isRunning = false;
let currentSessionType = 'work'; // 'work', 'short-break', 'long-break'
let sessionCount = 0;
let workMinutes = 25;
let shortBreakMinutes = 5;
let longBreakMinutes = 10;
let longBreakInterval = 4;

function updateConfig() {
    workMinutes = parseInt(workDurationInput.value);
    shortBreakMinutes = parseInt(shortBreakDurationInput.value);
    longBreakMinutes = parseInt(longBreakDurationInput.value);
    longBreakInterval = parseInt(longBreakIntervalInput.value);

    if (isNaN(workMinutes) || workMinutes < 1 || workMinutes > 45) {
        workMinutes = 25;
        workDurationInput.value = 25;
    }
    if (isNaN(shortBreakMinutes) || shortBreakMinutes < 1) {
        shortBreakMinutes = 5;
        shortBreakDurationInput.value = 5;
    }
    if (isNaN(longBreakMinutes) || longBreakMinutes < 1) {
        longBreakMinutes = 10;
        longBreakDurationInput.value = 10;
    }
    if (isNaN(longBreakInterval) || longBreakInterval < 1) {
        longBreakInterval = 4;
        longBreakIntervalInput.value = 4;
    }

    resetTimer();
}

function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}

function updateTimerDisplay(seconds) {
    timerDisplay.textContent = formatTime(seconds);
}

function playSound() {
    timerEndSound.play();
}

function startTimer() {
    if (isRunning) return;
    isRunning = true;
    startBtn.classList.add('hidden');
    pauseBtn.classList.remove('hidden');

    timer = setInterval(() => {
        timeLeft--;
        updateTimerDisplay(timeLeft);

        if (timeLeft <= 0) {
            clearInterval(timer);
            isRunning = false;
            playSound();

            if (currentSessionType === 'work') {
                sessionCount++;
                if (sessionCount % longBreakInterval === 0) {
                    currentSessionType = 'long-break';
                    timeLeft = longBreakMinutes * 60;
                    sessionInfo.textContent = `Long Break ${Math.ceil(sessionCount / longBreakInterval)}/${longBreakInterval}`; 
                    body.classList.add('bg-purple-700');
                } else {
                    currentSessionType = 'short-break';
                    timeLeft = shortBreakMinutes * 60;
                    sessionInfo.textContent = `Short Break`;
                    body.classList.add('bg-blue-700');
                }
            } else {
                currentSessionType = 'work';
                timeLeft = workMinutes * 60;
                sessionInfo.textContent = `Work Session ${sessionCount + 1}`;
                body.classList.add('bg-green-700');
            }
            updateTimerDisplay(timeLeft);
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            body.classList.remove('bg-purple-700', 'bg-blue-700', 'bg-green-700');
            setTimeout(() => {
                if (currentSessionType === 'work') {
                    body.classList.add('bg-gray-800');
                } else if (currentSessionType === 'short-break') {
                    body.classList.add('bg-gray-700');
                } else {
                    body.classList.add('bg-gray-600');
                }
            }, 100);
            if(currentSessionType === 'work') startTimer(); 
        }
    }, 1000);
}

function pauseTimer() {
    if (!isRunning) return;
    isRunning = false;
    clearInterval(timer);
    startBtn.classList.remove('hidden');
    pauseBtn.classList.add('hidden');
}

function resetTimer() {
    clearInterval(timer);
    isRunning = false;
    startBtn.classList.remove('hidden');
    pauseBtn.classList.add('hidden');
    currentSessionType = 'work';
    sessionCount = 0;
    timeLeft = workMinutes * 60;
    updateTimerDisplay(timeLeft);
    sessionInfo.textContent = `Work Session 1`;
    body.classList.remove('bg-purple-700', 'bg-blue-700', 'bg-green-700');
    body.classList.add('bg-gray-800');
}

function toggleTheme() {
    body.classList.toggle('dark');
    body.classList.toggle('light');
    updateThemeToggleButtonText();
}

function updateThemeToggleButtonText() {
    if (body.classList.contains('dark')) {
        themeToggle.textContent = 'Switch to Light Theme';
    } else {
        themeToggle.textContent = 'Switch to Dark Theme';
    }
}

startBtn.addEventListener('click', startTimer);
pauseBtn.addEventListener('click', pauseTimer);
resetBtn.addEventListener('click', resetTimer);
themeToggle.addEventListener('click', toggleTheme);

workDurationInput.addEventListener('change', updateConfig);
shortBreakDurationInput.addEventListener('change', updateConfig);
longBreakDurationInput.addEventListener('change', updateConfig);
longBreakIntervalInput.addEventListener('change', updateConfig);

// Initial setup
updateConfig();
updateThemeToggleButtonText();
body.classList.add('bg-gray-800');


</script>
</body>
</html>
